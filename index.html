<!DOCTYPE html>
<html>
    <head>
        <link rel="icon" type="image/x-icon" href="/images/favicon-32x32.png">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&display=swap" rel="stylesheet">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">

        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
        
        <link rel="stylesheet" href="index.css">
        <script src="index.js" defer></script>
    </head>
    <body>
        <main>
            <section class="nav-bar">
                <div>
                    <h1><a>Expense Trackers</a></h1>
                </div>

                    <i class="fa-solid fa-moon"></i>
            </section>
            <section class="balance">
                <div class="bal-account-div">
                    <div class="cash-flow">
                        <div>
                            <i class="fa fa-arrow-up"></i>
                        </div>
                        <div>
                            <p>INCOME</p>
                            <p id="income-display">$0</p>
                        </div>
                    </div>
                    <div class="balance-div">
                        <p>TOTAL BALANCE</p>
                        <h3 id="bal-account">$0.00</h3>
                    </div>
                    <div class="cash-flow">
                        <div>
                            <i class="fa fa-arrow-down"></i>
                        </div>
                        <div>
                            <p>EXPENSE</p>
                            <p id="expense-display">$0</p>
                        </div>
                    </div>
                </div>
            </section>
            <section>
                <section class="transaction-div">
                    <div>
                        <form class="transaction-form">
                            <h3>Add Transaction</h3>
                            <div class="type-toggle">
                                <a href="#" class="choice" id="income">Income</a>
                                <a href="#" id="expense">Expense</a>
                            </div>
                            <div>
                                <div class="input-group">
                                    <label>Name</label>
                                    <input type="text" placeholder="Enter description" id="text" required>
                                </div>
                                <div class="input-group">
                                    <label>Amount</label>
                                    <input type="number" placeholder="0.00" id="number" required>
                                </div>
                                <div class="input-group">
                                    <label>Date</label>
                                    <input type="date" id="date" required>
                                </div>
                                <button type="submit">Add Transaction</button>
                            </div>
                        </form>
                    </div>
                    <div>
                        <h3>Transaction</h3>
                        <div>
                            <div class="heading">
                                <p class="item">Name</p>
                                <p class="item">Date</p>
                                <p class="item">Type</p>
                                <p class="item">Amount</p>
                                <p class="option"></p>
                            </div>
                            <div id="transaction-display">
                                <p id="empty">Your transaction is empty</p>
                            </div>
                            
                        </div>
                        
                    </div>
                    <div>
                        <h3>Summary</h3>
                        <div>
                            <div></div>
                            <div></div>
                            <div></div>
                        </div>

                    </div>
                </section>
            </section>
        </main>
    </body>
</html>
